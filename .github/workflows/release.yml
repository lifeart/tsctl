name: Release

# Tag a release: `git tag v0.1.0 && git push --tags`. This builds the static
# binaries (attached to the GitHub Release) and pushes a multi-arch image to
# GHCR — fully reproducible, so releases stay infrequent and accurate.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release + upload binaries
  packages: write   # push the image to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      # Static, version-stamped binaries for linux+macOS (amd64+arm64) + checksums.
      - name: Build binaries
        run: BINARIES=1 IMAGE_BUILD=0 scripts/release.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tsctl-*
            dist/SHA256SUMS
          generate_release_notes: true

      # Multi-arch image via buildx. The Dockerfile cross-compiles (build stage on
      # $BUILDPLATFORM), so no QEMU is needed for the heavy step.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tsctl:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/tsctl:latest
