<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>tsctl — exit-node manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <h1 class="topbar-title">tsctl</h1>
        <div id="conn-status" class="conn conn-wait" role="status" aria-live="polite">
          connecting…
        </div>
      </div>
    </header>

    <main class="container">
      <div id="banners" aria-live="polite">
        <div id="global-error" class="banner banner-error hidden" role="alert"></div>
        <div id="netmap-err" class="banner banner-error hidden" role="alert"></div>
        <div id="stale-banner" class="banner banner-warn hidden" role="status"></div>
      </div>

      <section class="section">
        <h2 class="section-title">Routers</h2>
        <div id="routers" class="router-list"></div>
        <p id="routers-empty" class="empty hidden">No routers configured.</p>
      </section>

      <section class="section">
        <h2 class="section-title">Nodes</h2>
        <div id="nodes" class="list-group"></div>
        <p id="nodes-empty" class="empty hidden">No nodes in the netmap yet.</p>
      </section>

      <footer class="footer">
        <span id="updated"></span>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
