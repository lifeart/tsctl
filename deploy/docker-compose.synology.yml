# tsctl on Synology — DSM 7.2+ Container Manager "Project". UI on host port 8087.
#
# SETUP — uses a LOCAL image (no registry, nothing is ever downloaded)
#   1. Copy the image tarball for your NAS's CPU onto the Synology (File Station or
#      scp): tsctl-v0.2.1-linux-amd64-image.tar.gz (Intel NAS — most models) or
#      tsctl-v0.2.1-linux-arm64-image.tar.gz (ARM models). Build them locally with
#      `scripts/release.sh` (they end up in ./dist).
#   2. Load it as the local image `tsctl:v0.2.1` — either:
#        a) SSH:  sudo docker load -i tsctl-v0.2.1-linux-amd64-image.tar.gz   or
#        b) Container Manager → Image → Add → Add From File → pick the .tar.gz.
#   3. Container Manager → Project → Create → upload this file, fill in the env
#      below, then Build → Run. The bare `tsctl:v0.2.1` name + `pull_policy: never`
#      mean it uses the loaded image and never contacts a registry.
#   4. Open  http://<synology-ip>:8087/  and sign in with TSCTL_UI_PASSWORD.
#
# tsctl still joins your tailnet (userspace — no special NAS networking) to reach
# the routers; only the *web UI* is published on :8087. The tailnet path keeps
# working too if you also set TSCTL_OWNER.

services:
  tsctl:
    image: tsctl:v0.2.1       # the LOCAL image loaded from the tarball (no registry URL)
    pull_policy: never        # never reach out to a registry — use the loaded image only
    container_name: tsctl
    restart: unless-stopped
    # Run as root INSIDE the container so it can always write the state volume.
    # The image runs as nonroot (uid 65532), but DSM usually creates the volume /
    # bind dir root-owned, which 65532 can't write -> tsnet fails with "permission
    # denied" on /var/lib/tsctl/tailscaled.log.conf. The container is the security
    # boundary, so running as root here is the normal NAS pattern.
    # Prefer to keep nonroot? Drop this line and make the state dir writable by
    # uid 65532 instead — bind mount: `chown -R 65532:65532 <hostdir>`; named
    # volume: `sudo docker run --rm -v tsctl-state:/s busybox chown -R 65532:65532 /s`.
    user: "0:0"
    environment:
      # --- one-time tailnet enrollment (REQUIRED for the first run) -------------
      # A tag:tsctl auth key, or (recommended, never expires) an OAuth client
      # secret (tskey-client-...). After the node registers, its key lives in the
      # volume and this is no longer used — you can blank it out.
      TS_AUTHKEY: "tskey-client-xxxxxxxxxxxx"

      # --- web UI on the host port (REQUIRED: a password gates it) --------------
      # tsctl refuses to expose an unauthenticated control UI on a host port.
      TSCTL_HTTP_LISTEN: ":8087"
      TSCTL_UI_PASSWORD: "change-me-to-a-strong-password"
      # The hostname/IP you actually browse to, WITHOUT the port — REQUIRED for the
      # host port's anti-DNS-rebinding Host check. Add your NAS name and/or LAN IP.
      TSCTL_ALLOWED_HOSTS: "synology.local,192.168.1.50"

      # --- optional -------------------------------------------------------------
      # Also accept the tailnet path (your exact tailnet login) alongside the
      # password — then a tailnet device is admitted without signing in:
      # TSCTL_OWNER: "you@example.com"
      # Pin specific routers; leave unset to auto-discover every tag:router node:
      # TSCTL_ROUTERS: "100.64.0.10,100.64.0.11"
      # Router transport: default "tailscale-ssh" (needs `tailscale set --ssh` on the
      # routers + the ACL `ssh` rule). If you'd rather use a PASSWORD and NOT enable
      # Tailscale SSH, use "tailnet-password" — it reaches each router's 100.x over
      # the tailnet (tsnet) with a password, so it needs NO LAN map and works from
      # this bridged container (whose host can't route to 100.x directly). Set a
      # router root password (dropbear) + an ACL `tcp :22` grant:
      # TSCTL_ROUTER_TRANSPORT: "tailnet-password"
      # TSCTL_SSH_PASSWORD: "..."     # better: a Docker secret -> ssh_password
      # ("ip-password" instead reaches routers by LAN IP+password — needs
      # TSCTL_ROUTER_ADDRS=100.x=host[:port] + host-key verification; see README.)

    ports:
      - "8087:8087"          # host:container — the UI is at http://<nas>:8087/

    volumes:
      # Named volume = simplest correct permissions (the image pre-creates the dir
      # owned by the nonroot uid 65532). It holds the node identity key — back it
      # up; do not lose it.
      - tsctl-state:/var/lib/tsctl
      # Prefer a visible Synology shared folder instead? Use a bind mount, but the
      # folder MUST be writable by uid 65532 (the container runs nonroot) — set its
      # permissions in DSM / chown 65532:65532:
      # - /volume1/docker/tsctl:/var/lib/tsctl

    # tsnet is userspace: no cap_add, no /dev/net/tun, no host networking needed.
    security_opt:
      - no-new-privileges:true

volumes:
  tsctl-state:
